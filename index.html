<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>POS DZ</title>
  <link rel="stylesheet" href="style.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
  <style>
    body{display:flex;align-items:center;justify-content:center;min-height:100vh;overflow:hidden;}
    .splash{display:flex;flex-direction:column;align-items:center;gap:18px;text-align:center;}
    .splash-logo{width:90px;height:90px;background:var(--gradient-primary);border-radius:24px;display:flex;align-items:center;justify-content:center;font-size:2.5rem;color:#fff;font-family:Impact,sans-serif;box-shadow:0 8px 32px var(--glow);animation:pulse 2s infinite;}
    @keyframes pulse{0%,100%{box-shadow:0 8px 32px var(--glow);}50%{box-shadow:0 8px 48px var(--glow),0 0 0 12px rgba(124,58,237,0.12);}}
    .splash-title{font-size:2.4rem;font-weight:900;background:var(--gradient-primary);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
    .splash-sub{color:var(--text-secondary);font-size:0.95rem;font-weight:600;}
    .splash-loader{width:180px;height:4px;background:var(--bg-medium);border-radius:4px;overflow:hidden;}
    .splash-loader-bar{height:100%;width:0%;background:var(--gradient-primary);border-radius:4px;transition:width 0.1s linear;}
  </style>
</head>
<body>
<div class="bg-animated"></div>
<div class="splash">
  <div class="splash-logo">POS</div>
  <div class="splash-title">POS DZ</div>
  <div class="splash-sub" id="splashMsg">جاري التحميل...</div>
  <div class="splash-loader"><div class="splash-loader-bar" id="splashBar"></div></div>
</div>
<script src="app.js"></script>
<script>
(async function(){
  var bar=document.getElementById("splashBar");
  var msg=document.getElementById("splashMsg");
  var steps=[[20,"فتح قاعدة البيانات..."],[50,"تحميل الإعدادات..."],[80,"تطبيق الثيم..."],[95,"جاهز..."]];
  var i=0;
  var tick=setInterval(function(){if(i<steps.length){bar.style.width=steps[i][0]+"%";msg.textContent=steps[i][1];i++;}},180);
  try{
    await openDB();
    clearInterval(tick);
    bar.style.width="100%";msg.textContent="مرحباً!";
    await applyTheme();
    setTimeout(function(){
      var user=getSession();
      window.location.href=user?"sale.html":"login.html";
    },350);
  }catch(e){
    clearInterval(tick);
    msg.textContent="خطأ في التحميل";
    bar.style.background="#ef4444";
  }
})();
</script>
</body>
</html>
